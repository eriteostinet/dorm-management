<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宿舍数据导入 - 管理员</title>
  <script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.8/tcb.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: #333; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card h2 { font-size: 18px; margin-bottom: 16px; color: #1677ff; display: flex; align-items: center; gap: 8px; }
    
    .upload-area {
      border: 2px dashed #d9d9d9; border-radius: 8px; padding: 40px; text-align: center;
      cursor: pointer; transition: all 0.3s;
    }
    .upload-area:hover { border-color: #1677ff; background: #f6ffed; }
    .upload-area.dragover { border-color: #1677ff; background: #e6f7ff; }
    
    .btn {
      background: #1677ff; color: white; border: none; padding: 12px 24px; border-radius: 6px;
      font-size: 14px; cursor: pointer; margin-right: 10px; margin-bottom: 10px;
    }
    .btn:hover { background: #4096ff; }
    .btn-success { background: #52c41a; }
    .btn-success:hover { background: #73d13d; }
    .btn-danger { background: #ff4d4f; }
    .btn-danger:hover { background: #ff7875; }
    .btn:disabled { background: #d9d9d9; cursor: not-allowed; }
    
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 16px 0; }
    .stat-box { background: #f5f5f5; border-radius: 8px; padding: 16px; text-align: center; }
    .stat-box h3 { font-size: 24px; color: #1677ff; margin-bottom: 4px; }
    .stat-box p { font-size: 12px; color: #666; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #f0f0f0; }
    th { background: #f5f5f5; font-weight: 600; }
    tr:hover { background: #f8f9fa; }
    
    .log {
      background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 16px;
      font-family: 'Monaco', 'Menlo', monospace; font-size: 12px; 
      max-height: 350px; overflow-y: auto; margin-top: 16px; line-height: 1.6;
    }
    .log .success { color: #7ee787; }
    .log .error { color: #f85149; }
    .log .info { color: #79c0ff; }
    .log .warn { color: #ffa657; }
    
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
    .alert-success { background: #f6ffed; border: 1px solid #b7eb8f; color: #389e0d; }
    .alert-error { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; }
    .alert-info { background: #e6f7ff; border: 1px solid #91d5ff; color: #096dd9; }
    
    .progress-wrap { margin: 16px 0; }
    .progress { width: 100%; height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #1677ff, #36cfc9); width: 0%; transition: width 0.3s; }
    .progress-text { text-align: center; margin-top: 8px; font-size: 14px; color: #666; }
    
    .preview-table { max-height: 300px; overflow-y: auto; border: 1px solid #f0f0f0; border-radius: 6px; }
    
    .tip { background: #fffbe6; border: 1px solid #ffe58f; padding: 12px 16px; border-radius: 6px; font-size: 13px; color: #ad6800; margin-bottom: 16px; }
    
    .status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px;
    }
    .status-success { background: #f6ffed; color: #389e0d; }
    .status-error { background: #fff2f0; color: #cf1322; }
    .status-pending { background: #e6f7ff; color: #096dd9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏠 宿舍数据导入工具</h1>
    <p class="subtitle">通过云函数安全导入宿舍数据，无需配置前端权限</p>

    <!-- 上传区域 -->
    <div class="card">
      <h2>📁 1. 上传 Excel 文件</h2>
      <div class="tip">
        💡 支持的列：小区ID、楼栋、楼层、房间号、户型(人间数)
      </div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 48px; margin-bottom: 12px;">📊</p>
        <p style="font-size: 16px; margin-bottom: 8px;">点击或拖拽上传 Excel 文件</p>
        <p style="color: #999; font-size: 13px;">支持 .xlsx 格式</p>
      </div>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">
    </div>

    <!-- 数据预览 -->
    <div class="card" id="previewCard" style="display: none;">
      <h2>📋 2. 数据预览</h2>
      <div class="stats">
        <div class="stat-box"><h3 id="statTotal">0</h3><p>总记录</p></div>
        <div class="stat-box"><h3 id="statCommunities">0</h3><p>小区数</p></div>
        <div class="stat-box"><h3 id="statBuildings">0</h3><p>楼栋数</p></div>
        <div class="stat-box"><h3 id="statRooms">0</h3><p>房间数</p></div>
      </div>
      
      <div class="preview-table">
        <table id="previewTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
      
      <div style="margin-top: 16px;">
        <button class="btn btn-success" id="importBtn" onclick="importData()">
          🚀 开始导入
        </button>
        <button class="btn" onclick="clearData()">🗑️ 清空</button>
        <button class="btn btn-danger" onclick="clearAllDorms()">⚠️ 清空所有宿舍数据</button>
      </div>
    </div>

    <!-- 导入进度 -->
    <div class="card" id="progressCard" style="display: none;">
      <h2>⏳ 3. 导入进度</h2>
      <div id="progressAlert"></div>
      <div class="progress-wrap">
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        <p class="progress-text" id="progressText">准备导入...</p>
      </div>
      <div class="log" id="importLog"></div>
    </div>
  </div>

  <script>
    const ENV_ID = 'dorm-system-5g5k2k8k-1byd118ff42';
    let app = null;
    let parsedData = [];

    function init() {
      app = tcb.init({ env: ENV_ID });
      
      // 匿名登录后再调用云函数
      app.auth().anonymousAuthProvider().signIn()
        .then(() => {
          console.log('匿名登录成功');
          loadStats();
        })
        .catch(err => {
          console.log('匿名登录失败:', err);
        });
      
      setupDragDrop();
      document.getElementById('fileInput').addEventListener('change', handleFileSelect);
    }

    async function loadStats() {
      try {
        const result = await app.callFunction({
          name: 'repairdb',
          data: { action: 'status' }
        });
        console.log('云数据库连接正常:', result.result);
      } catch (e) {
        console.log('获取统计失败:', e.message);
      }
    }

    function setupDragDrop() {
      const uploadArea = document.getElementById('uploadArea');
      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
      });
      uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
      });
    }

    function handleFileSelect(e) {
      if (e.target.files[0]) processFile(e.target.files[0]);
    }

    function processFile(file) {
      if (!file.name.match(/\.(xlsx|xls)$/)) {
        showAlert('previewCard', '请选择 Excel 文件', 'error');
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const jsonData = XLSX.utils.sheet_to_json(sheet);
          
          // 映射列名
          parsedData = jsonData.map(row => ({
            communityId: row['小区ID'] || row['小区'] || row['communityId'],
            building: row['楼栋'] || row['楼'] || row['building'] || '-',
            floor: parseInt(row['楼层'] || row['floor'] || row['层']) || 1,
            roomNumber: String(row['房间号'] || row['房号'] || row['room'] || row['房间'] || ''),
            layout: parseInt(row['户型(人间数)'] || row['户型'] || row['layout'] || row['容纳人数']) || 4
          })).filter(r => r.communityId && r.roomNumber);

          showPreview();
        } catch (err) {
          alert('解析失败: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function showPreview() {
      document.getElementById('previewCard').style.display = 'block';
      
      const communities = [...new Set(parsedData.map(d => d.communityId))];
      const buildings = [...new Set(parsedData.map(d => d.building))];
      
      document.getElementById('statTotal').textContent = parsedData.length;
      document.getElementById('statCommunities').textContent = communities.length;
      document.getElementById('statBuildings').textContent = buildings.length;
      document.getElementById('statRooms').textContent = parsedData.length;

      const thead = document.querySelector('#previewTable thead');
      const tbody = document.querySelector('#previewTable tbody');
      
      if (parsedData.length > 0) {
        thead.innerHTML = '<tr><th>小区ID</th><th>楼栋</th><th>楼层</th><th>房间号</th><th>户型</th></tr>';
        tbody.innerHTML = parsedData.slice(0, 15).map(row => 
          `<tr><td>${row.communityId}</td><td>${row.building}</td><td>${row.floor}</td><td>${row.roomNumber}</td><td>${row.layout}人间</td></tr>`
        ).join('');
        if (parsedData.length > 15) {
          tbody.innerHTML += `<tr><td colspan="5" style="text-align:center;color:#999;">... 还有 ${parsedData.length - 15} 条 ...</td></tr>`;
        }
      }
      
      document.getElementById('previewCard').scrollIntoView({ behavior: 'smooth' });
    }

    async function importData() {
      if (parsedData.length === 0) return;
      
      // 检查是否已登录
      const auth = app.auth();
      if (!auth.hasLoginState()) {
        alert('正在登录，请稍后再试...');
        try {
          await auth.anonymousAuthProvider().signIn();
        } catch (e) {
          alert('登录失败: ' + e.message);
          return;
        }
      }
      
      const btn = document.getElementById('importBtn');
      btn.disabled = true;
      
      document.getElementById('progressCard').style.display = 'block';
      const logEl = document.getElementById('importLog');
      logEl.innerHTML = '';
      
      const log = (msg, type) => {
        const line = document.createElement('div');
        line.className = type || '';
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      };

      log(`准备导入 ${parsedData.length} 条宿舍数据...`, 'info');
      document.getElementById('progressBar').style.width = '10%';

      try {
        // 分批导入，每批100条
        const batchSize = 100;
        let totalSuccess = 0, totalUpdated = 0, totalFailed = 0;
        
        for (let i = 0; i < parsedData.length; i += batchSize) {
          const batchData = parsedData.slice(i, i + batchSize);
          // 转换为云函数期望的格式
          const batch = batchData.map(item => ({
            _id: `DORM_${item.communityId}_${item.building}_${item.roomNumber}`.replace(/[^a-zA-Z0-9_-]/g, '_'),
            communityId: item.communityId,
            building: item.building || '-',
            floor: parseInt(item.floor) || 1,
            roomNumber: String(item.roomNumber),
            layout: parseInt(item.layout) || 4,
            status: 'normal',
            currentOccupants: 0,
            createdAt: new Date()
          }));
          
          const progress = Math.round(((i + batchData.length) / parsedData.length) * 90) + 10;
          
          document.getElementById('progressBar').style.width = progress + '%';
          document.getElementById('progressText').textContent = 
            `导入中... ${Math.min(i + batchSize, parsedData.length)}/${parsedData.length}`;
          
          log(`正在导入批次 ${Math.floor(i/batchSize) + 1} (${batch.length}条)...`, 'info');
          
          const result = await app.callFunction({
            name: 'repairdb',
            data: { action: 'batchCreate', data: batch }
          });
          
          if (result.result.success) {
            const results = result.result.results || [];
            const batchSuccess = results.filter(r => r.status === 'success').length;
            const batchUpdated = results.filter(r => r.status === 'updated').length;
            const batchFailed = results.filter(r => r.status === 'error').length;
            totalSuccess += batchSuccess;
            totalUpdated += batchUpdated;
            totalFailed += batchFailed;
            log(`✓ 批次完成: 新增${batchSuccess}, 更新${batchUpdated}, 失败${batchFailed}`, 'success');
          } else {
            totalFailed += batch.length;
            log(`✗ 批次失败: ${result.result.error}`, 'error');
          }
          
          await new Promise(r => setTimeout(r, 300));
        }

        document.getElementById('progressBar').style.width = '100%';
        document.getElementById('progressText').textContent = 
          `导入完成！新增:${totalSuccess} 更新:${totalUpdated} 失败:${totalFailed}`;
        
        log('', '');
        log('========== 导入完成 ==========', 'info');
        log(`总计: ${parsedData.length} 条`, 'info');
        log(`新增: ${totalSuccess} 条`, 'success');
        log(`更新: ${totalUpdated} 条`, totalUpdated > 0 ? 'warn' : 'info');
        if (totalFailed > 0) log(`失败: ${totalFailed} 条`, 'error');
        
        const alertType = totalFailed > 0 ? 'error' : 'success';
        showAlert('progressAlert', 
          `导入完成！新增:${totalSuccess}, 更新:${totalUpdated}, 失败:${totalFailed}`, 
          alertType);
          
      } catch (err) {
        log(`导入失败: ${err.message}`, 'error');
        showAlert('progressAlert', '导入失败: ' + err.message, 'error');
      }
      
      btn.disabled = false;
    }

    async function clearAllDorms() {
      alert('请前往腾讯云控制台手动清理数据');
    }

    function clearData() {
      parsedData = [];
      document.getElementById('previewCard').style.display = 'none';
      document.getElementById('progressCard').style.display = 'none';
      document.getElementById('fileInput').value = '';
    }

    function showAlert(elementId, message, type) {
      document.getElementById(elementId).innerHTML = 
        `<div class="alert alert-${type}">${message}</div>`;
    }

    window.onload = init;
  </script>
</body>
</html>
