<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多端同步测试 - 宿舍管理系统</title>
  <script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.8/tcb.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #333; margin-bottom: 10px; font-size: 24px; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 14px; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { font-size: 18px; margin-bottom: 15px; color: #1677ff; display: flex; align-items: center; gap: 8px; }
    .status-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 500; }
    .status-success { background: #f6ffed; color: #52c41a; }
    .status-error { background: #fff2f0; color: #ff4d4f; }
    .status-warning { background: #fff7e6; color: #fa8c16; }
    button { background: #1677ff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; margin-top: 10px; transition: all 0.3s; }
    button:hover { background: #4096ff; transform: translateY(-1px); }
    button:disabled { background: #d9d9d9; cursor: not-allowed; transform: none; }
    button.success { background: #52c41a; }
    button.danger { background: #ff4d4f; }
    .log { background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 16px; margin-top: 15px; font-family: 'SF Mono', Monaco, monospace; font-size: 13px; max-height: 300px; overflow-y: auto; line-height: 1.6; }
    .log .success { color: #7ee787; }
    .log .error { color: #f85149; }
    .log .info { color: #79c0ff; }
    .log .warning { color: #ffa657; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 15px 0; }
    .stat-box { background: #f5f5f5; border-radius: 8px; padding: 16px; text-align: center; }
    .stat-box h3 { font-size: 28px; color: #1677ff; margin-bottom: 4px; }
    .stat-box p { font-size: 13px; color: #666; }
    .info-box { background: #e6f7ff; border: 1px solid #91d5ff; border-radius: 8px; padding: 12px 16px; margin: 12px 0; font-size: 14px; color: #0958d9; }
    .test-result { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 6px; margin: 8px 0; font-size: 14px; }
    .test-result.success { background: #f6ffed; color: #52c41a; }
    .test-result.error { background: #fff2f0; color: #ff4d4f; }
    .test-result.pending { background: #f5f5f5; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 多端同步验证工具</h1>
    <p class="subtitle">验证云数据库连接和多端数据同步功能</p>

    <div class="card">
      <h2>📊 系统状态</h2>
      <div class="grid">
        <div class="stat-box">
          <h3 id="cloudStatusIcon">⏳</h3>
          <p>云数据库连接</p>
        </div>
        <div class="stat-box">
          <h3 id="cloudCount">-</h3>
          <p>云端工单数</p>
        </div>
        <div class="stat-box">
          <h3 id="syncStatus">-</h3>
          <p>同步状态</p>
        </div>
      </div>
      <button onclick="checkSystemStatus()">刷新状态</button>
    </div>

    <div class="card">
      <h2>📝 创建测试工单</h2>
      <p style="color: #666; font-size: 14px; margin-bottom: 12px;">在任何设备上创建工单，其他设备都能实时看到</p>
      <button class="success" onclick="createTestTicket()">➕ 创建测试工单</button>
      <div id="createLog" class="log" style="display: none;"></div>
    </div>

    <div class="card">
      <h2>🔍 多端同步测试</h2>
      <p style="color: #666; font-size: 14px; margin-bottom: 12px;">测试步骤：</p>
      <ol style="margin-left: 20px; color: #666; font-size: 14px; line-height: 2;">
        <li>在当前页面创建测试工单</li>
        <li>在其他设备/浏览器打开维修中心</li>
        <li>确认能看到刚创建的工单</li>
      </ol>
      <div class="info-box">
        💡 提示：也可以在其他设备创建工单，然后在这里点击"刷新状态"验证
      </div>
    </div>

    <div class="card">
      <h2>🧹 清理测试数据</h2>
      <button class="danger" onclick="clearTestData()">🗑️ 删除所有测试数据</button>
      <p style="color: #999; font-size: 12px; margin-top: 10px;">⚠️ 此操作将删除所有工单数据，请谨慎使用</p>
    </div>

    <div class="card">
      <h2>📋 操作日志</h2>
      <div id="mainLog" class="log">等待操作...</div>
    </div>
  </div>

  <script>
    const ENV_ID = 'dorm-system-5g5k2k8k-1byd118ff42';
    let cloudDB = null;
    let cloudApp = null;

    function log(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.style.display = 'block';
      const line = document.createElement('div');
      line.className = type || '';
      line.textContent = new Date().toLocaleTimeString() + ' ' + message;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
      console.log(message);
    }

    // 初始化 CloudBase
    function initCloud() {
      try {
        cloudApp = tcb.init({ env: ENV_ID });
        cloudDB = cloudApp.database();
        return true;
      } catch (e) {
        log('mainLog', 'CloudBase 初始化失败: ' + e.message, 'error');
        return false;
      }
    }

    // 检查系统状态
    async function checkSystemStatus() {
      log('mainLog', '=== 检查系统状态 ===', 'info');
      
      if (!cloudDB && !initCloud()) {
        document.getElementById('cloudStatusIcon').textContent = '❌';
        return;
      }

      try {
        // 检查云端数据
        const result = await cloudDB.collection('repairTickets').get();
        const count = result.data ? result.data.length : 0;
        
        document.getElementById('cloudCount').textContent = count;
        document.getElementById('cloudStatusIcon').textContent = '✅';
        
        if (count > 0) {
          document.getElementById('syncStatus').textContent = '✅';
          log('mainLog', `✅ 云数据库连接正常，共有 ${count} 条工单`, 'success');
          
          // 显示最新几条
          result.data.slice(0, 3).forEach(ticket => {
            log('mainLog', `  📋 ${ticket._id} | ${ticket.category} | ${ticket.status}`, 'info');
          });
        } else {
          document.getElementById('syncStatus').textContent = '⚠️';
          log('mainLog', '⚠️ 云数据库为空，还没有工单数据', 'warning');
        }
      } catch (e) {
        document.getElementById('cloudStatusIcon').textContent = '❌';
        document.getElementById('cloudCount').textContent = '?';
        log('mainLog', '❌ 查询失败: ' + e.message, 'error');
      }
    }

    // 创建测试工单
    async function createTestTicket() {
      const logId = 'createLog';
      document.getElementById(logId).innerHTML = '';
      document.getElementById(logId).style.display = 'block';
      
      log(logId, '正在创建测试工单...', 'info');
      
      if (!cloudDB && !initCloud()) {
        log(logId, '❌ CloudBase 未连接', 'error');
        return;
      }

      const testTicket = {
        _id: 'TEST_' + Date.now(),
        ticketType: 'facility',
        communityId: 'JW',
        dormId: 'JW-TEST',
        roomId: '101',
        reporterId: 'test_user',
        reporterName: '测试用户_' + Math.floor(Math.random() * 1000),
        category: '设备测试',
        subCategory: '同步测试',
        description: '这是多端同步测试工单，创建于 ' + new Date().toLocaleString(),
        images: [],
        urgency: 'normal',
        status: 'reported',
        assignedTo: null,
        assignedName: null,
        assignedTime: null,
        estimatedTime: null,
        solution: null,
        materials: [],
        laborCost: null,
        totalCost: null,
        processImages: [],
        completedDate: null,
        confirmStatus: 'pending',
        confirmRemark: null,
        rating: null,
        comment: null,
        reportedAt: new Date(),
        startedAt: null,
        confirmedAt: null,
        isRecurrent: false,
        relatedTicketId: null,
        updatedAt: new Date()
      };

      try {
        await cloudDB.collection('repairTickets').add(testTicket);
        log(logId, '✅ 测试工单创建成功！', 'success');
        log(logId, '📝 工单编号: ' + testTicket._id, 'info');
        log(logId, '', '');
        log(logId, '💡 现在你可以：', 'info');
        log(logId, '  1. 打开维修中心查看此工单', 'info');
        log(logId, '  2. 在其他设备/浏览器刷新页面', 'info');
        log(logId, '  3. 确认多端同步正常', 'info');
        
        // 刷新状态
        setTimeout(checkSystemStatus, 1000);
      } catch (e) {
        log(logId, '❌ 创建失败: ' + e.message, 'error');
      }
    }

    // 清理测试数据
    async function clearTestData() {
      if (!confirm('确定要删除所有测试数据吗？此操作不可恢复！')) return;
      
      log('mainLog', '正在清理测试数据...', 'warning');
      
      if (!cloudDB && !initCloud()) return;

      try {
        const result = await cloudDB.collection('repairTickets').get();
        let deleted = 0;
        
        for (const doc of result.data || []) {
          try {
            await cloudDB.collection('repairTickets').doc(doc._id).remove();
            deleted++;
          } catch (e) {}
        }
        
        log('mainLog', `✅ 已删除 ${deleted} 条数据`, 'success');
        checkSystemStatus();
      } catch (e) {
        log('mainLog', '❌ 清理失败: ' + e.message, 'error');
      }
    }

    // 页面加载时自动检查
    window.onload = function() {
      initCloud();
      checkSystemStatus();
    };
  </script>
</body>
</html>
