<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>数据恢复检查</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    .card { background: #f5f5f5; border-radius: 12px; padding: 20px; margin: 20px 0; }
    h1 { color: #333; }
    button { background: #1677ff; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
    button:hover { background: #4096ff; }
    .log { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; font-size: 14px; white-space: pre-wrap; }
    .success { color: #7ee787; }
    .error { color: #f85149; }
    .warning { color: #ffa657; }
  </style>
</head>
<body>
  <h1>🔍 数据恢复检查</h1>
  
  <div class="card">
    <h2>本地数据库检查</h2>
    <button onclick="checkLocalData()">检查 IndexedDB 数据</button>
    <div id="localLog" class="log">点击按钮检查...</div>
  </div>

  <div class="card">
    <h2>数据迁移</h2>
    <button onclick="createSampleData()">创建示例数据</button>
    <p style="color: #666; font-size: 14px; margin-top: 10px;">如果本地数据已丢失，可以创建示例数据进行测试</p>
    <div id="migrateLog" class="log" style="display: none;"></div>
  </div>

  <script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.8/tcb.js"></script>
  <script>
    const DB_NAME = 'DormManagementDB';
    const ENV_ID = 'dorm-system-5g5k2k8k-1byd118ff42';

    function log(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.style.display = 'block';
      const line = document.createElement('div');
      line.className = type || '';
      line.textContent = new Date().toLocaleTimeString() + ' ' + message;
      el.appendChild(line);
    }

    async function checkLocalData() {
      const logId = 'localLog';
      document.getElementById(logId).innerHTML = '';
      
      log(logId, '正在检查 IndexedDB...', 'info');
      
      try {
        const req = indexedDB.open(DB_NAME);
        
        req.onerror = () => {
          log(logId, '❌ 无法打开 IndexedDB', 'error');
        };
        
        req.onsuccess = (e) => {
          const db = e.target.result;
          log(logId, '✅ IndexedDB 打开成功', 'success');
          
          // 列出所有存储
          const stores = [];
          for (let i = 0; i < db.objectStoreNames.length; i++) {
            stores.push(db.objectStoreNames[i]);
          }
          log(logId, '📁 存储列表: ' + JSON.stringify(stores), 'info');
          
          if (!db.objectStoreNames.contains('repairTickets')) {
            log(logId, '❌ 没有找到 repairTickets 存储', 'error');
            log(logId, '💡 本地数据可能已丢失', 'warning');
            return;
          }
          
          // 统计数量
          const tx = db.transaction('repairTickets', 'readonly');
          const store = tx.objectStore('repairTickets');
          const countReq = store.count();
          
          countReq.onsuccess = () => {
            log(logId, '📊 repairTickets 记录数: ' + countReq.result, countReq.result > 0 ? 'success' : 'warning');
            
            if (countReq.result > 0) {
              const getAllReq = store.getAll();
              getAllReq.onsuccess = () => {
                log(logId, '✅ 数据样例:', 'info');
                getAllReq.result.slice(0, 3).forEach(item => {
                  log(logId, '  - ' + item._id + ' | ' + item.category + ' | ' + item.status, 'info');
                });
              };
            }
          };
        };
      } catch (err) {
        log(logId, '❌ 错误: ' + err.message, 'error');
      }
    }

    async function createSampleData() {
      const logId = 'migrateLog';
      document.getElementById(logId).innerHTML = '';
      document.getElementById(logId).style.display = 'block';
      
      log(logId, '正在创建示例数据...', 'info');
      
      const sampleData = [
        {
          _id: 'TKT_' + Date.now(),
          ticketType: 'repair',
          communityId: 'JW',
          dormId: 'JW-A101',
          roomId: '101',
          reporterId: 'emp001',
          reporterName: '张三',
          category: '水电',
          subCategory: '水管漏水',
          description: '卫生间水管漏水',
          urgency: 'urgent',
          status: 'reported',
          images: [],
          reportedAt: new Date(),
          createdAt: new Date(),
          updatedAt: new Date()
        },
        {
          _id: 'TKT_' + (Date.now() + 1),
          ticketType: 'repair',
          communityId: 'TY',
          dormId: 'TY-B202',
          roomId: '202',
          reporterId: 'emp002',
          reporterName: '李四',
          category: '电器',
          subCategory: '空调不冷',
          description: '空调不制冷',
          urgency: 'normal',
          status: 'processing',
          images: [],
          reportedAt: new Date(Date.now() - 86400000),
          startedAt: new Date(),
          createdAt: new Date(Date.now() - 86400000),
          updatedAt: new Date()
        }
      ];

      try {
        const req = indexedDB.open(DB_NAME);
        
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('repairTickets')) {
            db.createObjectStore('repairTickets', { keyPath: '_id' });
            log(logId, '📝 创建 repairTickets 存储', 'info');
          }
        };
        
        req.onsuccess = async (e) => {
          const db = e.target.result;
          
          // 确保存储存在
          if (!db.objectStoreNames.contains('repairTickets')) {
            log(logId, '❌ 存储不存在，需要重新初始化数据库', 'error');
            return;
          }
          
          const tx = db.transaction('repairTickets', 'readwrite');
          const store = tx.objectStore('repairTickets');
          
          let success = 0;
          for (const item of sampleData) {
            try {
              await new Promise((res, rej) => {
                const putReq = store.put(item);
                putReq.onsuccess = res;
                putReq.onerror = rej;
              });
              log(logId, '✅ 创建: ' + item._id, 'success');
              success++;
            } catch (e) {
              log(logId, '❌ 失败: ' + e.message, 'error');
            }
          }
          
          log(logId, '', '');
          log(logId, '========== 完成 ==========', 'info');
          log(logId, '✅ 成功创建 ' + success + ' 条示例数据', 'success');
          log(logId, '', '');
          log(logId, '💡 现在你可以去维修中心查看数据了', 'info');
          log(logId, '🔗 或点击上方"检查 IndexedDB 数据"确认', 'info');
        };
      } catch (err) {
        log(logId, '❌ 错误: ' + err.message, 'error');
      }
    }
  </script>
</body>
</html>
