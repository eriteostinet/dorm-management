<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据库同步工具</title>
  <script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.8/tcb.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #333; margin-bottom: 10px; }
    .subtitle { color: #666; margin-bottom: 20px; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { font-size: 18px; margin-bottom: 15px; color: #1677ff; }
    button { background: #1677ff; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; margin: 10px 0; }
    button:hover { background: #4096ff; }
    button:disabled { background: #d9d9d9; cursor: not-allowed; }
    button.success { background: #52c41a; }
    button.danger { background: #ff4d4f; }
    .log { background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 15px; margin-top: 15px; font-family: monospace; font-size: 14px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
    .success { color: #7ee787; }
    .error { color: #f85149; }
    .warning { color: #ffa657; }
    .info { color: #79c0ff; }
    .result-box { background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 8px; padding: 20px; margin: 20px 0; text-align: center; }
    .result-box.error { background: #fff2f0; border-color: #ffccc7; }
    .result-number { font-size: 48px; font-weight: bold; color: #52c41a; }
    .result-number.error { color: #ff4d4f; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 数据库同步工具</h1>
    <p class="subtitle">将本地数据强制同步到云端</p>

    <div class="card">
      <h2>同步操作</h2>
      <button id="syncBtn" onclick="startSync()">开始同步</button>
      <div id="result" style="display: none;"></div>
      <div id="log" class="log">等待操作...</div>
    </div>
  </div>

  <script>
    const ENV_ID = 'dorm-system-5g5k2k8k-1byd118ff42';
    const DB_NAME = 'DormManagementDB';

    function log(msg, type) {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      line.className = type || '';
      line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
      console.log(msg);
    }

    async function startSync() {
      const btn = document.getElementById('syncBtn');
      const resultDiv = document.getElementById('result');
      const logDiv = document.getElementById('log');
      
      btn.disabled = true;
      btn.textContent = '同步中...';
      resultDiv.style.display = 'none';
      logDiv.innerHTML = '';
      
      let cloudDB = null;
      let localData = [];
      let successCount = 0;
      let failCount = 0;

      try {
        // 1. 连接 CloudBase
        log('正在连接 CloudBase...', 'info');
        try {
          const app = tcb.init({ env: ENV_ID });
          cloudDB = app.database();
          log('✅ CloudBase 连接成功', 'success');
        } catch (e) {
          log('❌ CloudBase 连接失败: ' + e.message, 'error');
          throw e;
        }

        // 2. 读取本地数据
        log('正在读取本地数据...', 'info');
        try {
          const req = indexedDB.open(DB_NAME);
          const db = await new Promise((res, rej) => {
            req.onsuccess = () => res(req.result);
            req.onerror = () => rej(req.error);
          });
          
          if (!db.objectStoreNames.contains('repairTickets')) {
            log('❌ 本地没有 repairTickets 数据', 'error');
            throw new Error('本地没有数据');
          }
          
          const tx = db.transaction('repairTickets', 'readonly');
          const store = tx.objectStore('repairTickets');
          const getReq = store.getAll();
          localData = await new Promise((res, rej) => {
            getReq.onsuccess = () => res(getReq.result);
            getReq.onerror = () => rej(getReq.error);
          });
          
          log('✅ 读取到 ' + localData.length + ' 条本地数据', 'success');
          
          if (localData.length === 0) {
            log('❌ 本地数据为空', 'error');
            throw new Error('本地数据为空');
          }
        } catch (e) {
          log('❌ 读取本地数据失败: ' + e.message, 'error');
          throw e;
        }

        // 3. 上传到云端
        log('开始上传到云端...', 'info');
        for (let i = 0; i < localData.length; i++) {
          const item = localData[i];
          btn.textContent = '同步中... (' + (i+1) + '/' + localData.length + ')';
          
          try {
            await cloudDB.collection('repairTickets').add(item);
            log('✅ 上传成功: ' + item._id, 'success');
            successCount++;
          } catch (e) {
            if (e.message && (e.message.includes('duplicate') || e.message.includes('exists'))) {
              // 尝试更新
              try {
                const { _id, ...updateData } = item;
                await cloudDB.collection('repairTickets').doc(_id).update(updateData);
                log('📝 更新成功: ' + item._id, 'success');
                successCount++;
              } catch (e2) {
                log('❌ 更新失败: ' + item._id + ' - ' + e2.message, 'error');
                failCount++;
              }
            } else {
              log('❌ 上传失败: ' + item._id + ' - ' + e.message, 'error');
              failCount++;
            }
          }
        }

        // 显示结果
        resultDiv.className = 'result-box' + (failCount > 0 ? ' error' : '');
        resultDiv.innerHTML = '<div class="result-number' + (failCount > 0 ? ' error' : '') + '">' + successCount + '/' + localData.length + '</div><p>' + (failCount > 0 ? '同步完成，部分失败' : '同步成功！') + '</p>';
        resultDiv.style.display = 'block';
        
        log('', '');
        log('========== 同步完成 ==========', 'info');
        log('✅ 成功: ' + successCount + ' 条', 'success');
        log('❌ 失败: ' + failCount + ' 条', failCount > 0 ? 'error' : 'info');
        
        btn.textContent = failCount > 0 ? '同步完成（有失败）' : '同步完成！';
        btn.className = failCount > 0 ? 'danger' : 'success';
        
      } catch (e) {
        resultDiv.className = 'result-box error';
        resultDiv.innerHTML = '<div class="result-number error">❌</div><p>同步失败: ' + e.message + '</p>';
        resultDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '重试同步';
      }
    }
  </script>
</body>
</html>
