version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: dorm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dorm_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dorm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/dorm_management?schema=public"
      JWT_SECRET: "your-jwt-secret-key-change-in-production"
      JWT_REFRESH_SECRET: "your-jwt-refresh-secret-change-in-production"
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: "http://localhost:80"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed || true &&
             node dist/index.js"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dorm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads: